- id: hs_char_encode
  language: haskell
  symbol: encode
  import: Data.Char
  category: char
  tags:
      op: [transformar]
      domain: [string]
      intent: [cifrar]
  when: >
      Ejemplo de cifrado por desplazamiento usando ord/chr.
  syntax: |
      encode :: Int -> String -> String
  my_example: |
      encode n = map (chr . (+n) . ord)

- id: hs_char_decode
  language: haskell
  symbol: decode
  import: Data.Char
  category: char
  tags:
      op: [transformar]
      domain: [string]
      intent: [descifrar]
  syntax: |
      decode :: Int -> String -> String
  my_example: |
      decode n = encode (-n)
