- id: hs_char_isControl
  language: haskell
  symbol: isControl
  import: Data.Char
  category: char
  tags:
      op: [predicado]
      domain: [unicode]
      intent: [control_chars]
  when: >
      Detectar caracteres no imprimibles de control (p.ej. '\n', '\t').
  syntax: |
      isControl :: Char -> Bool
  my_example: |
      isControl '\n' -- True
  related: [hs_char_isPrint]

- id: hs_char_isSpace
  language: haskell
  symbol: isSpace
  import: Data.Char
  category: char
  tags:
      op: [predicado]
      intent: [whitespace]
  when: >
      Detectar separadores de espacio (incluye Unicode).
  syntax: |
      isSpace :: Char -> Bool
  my_example: |
      isSpace ' ' -- True
  related: []

- id: hs_char_isLower
  language: haskell
  symbol: isLower
  import: Data.Char
  category: char
  tags:
      op: [predicado]
      intent: [lowercase]
  syntax: |
      isLower :: Char -> Bool
  my_example: |
      isLower 'a' -- True
  related: [hs_char_isUpper]

- id: hs_char_isUpper
  language: haskell
  symbol: isUpper
  import: Data.Char
  category: char
  tags:
      op: [predicado]
      intent: [uppercase]
  syntax: |
      isUpper :: Char -> Bool
  my_example: |
      isUpper 'A' -- True
  related: [hs_char_isLower]

- id: hs_char_isAlpha
  language: haskell
  symbol: isAlpha
  import: Data.Char
  category: char
  tags:
      op: [predicado]
      intent: [letter]
  when: >
      Detectar letras (Unicode-aware).
  syntax: |
      isAlpha :: Char -> Bool
  my_example: |
      isAlpha 'ñ' -- True
  related: [hs_char_isAlphaNum, hs_char_isLetter]

- id: hs_char_isAlphaNum
  language: haskell
  symbol: isAlphaNum
  import: Data.Char
  category: char
  tags:
      op: [predicado]
      intent: [alphanumeric]
  when: >
      Detectar letras o dígitos.
      Equivalente a isAlpha || isDigit.
  syntax: |
      isAlphaNum :: Char -> Bool
  my_example: |
      isAlphaNum '3' -- True
  related: [hs_char_isAlpha, hs_char_isDigit]

- id: hs_char_isPrint
  language: haskell
  symbol: isPrint
  import: Data.Char
  category: char
  tags:
      op: [predicado]
      intent: [printable]
  when: >
      Detectar caracteres imprimibles (excluye control).
  syntax: |
      isPrint :: Char -> Bool
  my_example: |
      isPrint 'A' -- True
  related: [hs_char_isControl]

